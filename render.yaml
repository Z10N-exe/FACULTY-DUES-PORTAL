services:
  # ── Backend API (Free Web Service) ──────────────────────────
  - type: web
    name: faculty-dues-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false  # Set manually in Render dashboard
      - key: PAYSTACK_SECRET_KEY
        sync: false  # Set manually in Render dashboard
      - key: JWT_SECRET
        sync: false  # Set manually in Render dashboard
      - key: CLIENT_URL
        sync: false  # e.g. https://faculty-dues.onrender.com

  # ── Student Frontend (Free Static Site) ─────────────────────
  - type: static
    name: faculty-dues-client
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ── Admin Panel (Free Static Site) ──────────────────────────
  - type: static
    name: faculty-dues-admin
    rootDir: admin
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
